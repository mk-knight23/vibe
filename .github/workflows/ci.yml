name: CI - Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  cli:
    name: CLI - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vibe-cli
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: vibe-cli/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint --if-present
      
      - name: Build
        run: npm run build
      
      - name: Test
        run: npm test --if-present
      
      - name: Check version
        run: node -p "require('./package.json').version"

  web:
    name: Web - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vibe-web
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: vibe-web/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint --if-present
      
      - name: Type check
        run: npm run typecheck --if-present
      
      - name: Build
        run: npm run build
      
      - name: Check version
        run: node -p "require('./package.json').version"

  extension:
    name: Extension - Build & Package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vibe-code
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: vibe-code/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint --if-present
      
      - name: Compile
        run: npm run compile
      
      - name: Package
        run: npx @vscode/vsce package
      
      - name: Check version
        run: node -p "require('./package.json').version"
      
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vibe-vscode-vsix
          path: vibe-code/*.vsix
          retention-days: 7
