name: Publish vibe-cli to npm

on:
  push:
    tags:
      - 'vibe-cli-v*'

permissions:
  contents: read
  packages: write

defaults:
  run:
    working-directory: vibe-cli

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Validate NPM_TOKEN secret
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error title=Missing Secret::NPM_TOKEN is not set; publish will fail."
            exit 1
          else
            echo "NPM_TOKEN is set (valid)"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Verify CLI starts
        run: node cli.cjs --help || true

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
