name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: VIBE v${{ steps.version.outputs.VERSION }}
          body: |
            ## VIBE v${{ steps.version.outputs.VERSION }} Release
            
            ### 📦 Packages Included:
            - **Vibe CLI v4.0** - Terminal AI Assistant
            - **Vibe Web v2.0** - Interactive Documentation Platform
            - **Vibe Code v4.0** - VS Code Extension
            
            ### 🚀 Installation:
            
            **CLI:**
            ```bash
            npm install -g vibe-ai-cli
            ```
            
            **Web:**
            Visit [https://vibe-ai.vercel.app](https://vibe-ai.vercel.app)
            
            **VS Code Extension:**
            Search "Vibe VS Code" in VS Code Marketplace
            
            ### 📝 What's New:
            - Multi-provider support (4 providers, 27+ models)
            - Free API access included
            - Enhanced UI/UX across all platforms
            - Improved performance and stability
            
            See individual package READMEs for detailed changes.
          draft: false
          prerelease: false
