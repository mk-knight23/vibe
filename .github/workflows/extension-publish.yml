name: Publish VS Code Extension

on:
  push:
    tags:
      - 'code-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: cd vibe-code && npm ci
      
      - name: Install vsce
        run: npm install -g @vscode/vsce
      
      - name: Compile extension
        run: cd vibe-code && npm run compile
      
      - name: Package extension
        run: cd vibe-code && vsce package
      
      - name: Publish to VS Code Marketplace
        run: cd vibe-code && vsce publish -p ${{ secrets.VSCE_TOKEN }}
      
      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./vibe-code/package.json').version")" >> $GITHUB_OUTPUT
      
      - name: Upload VSIX to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./vibe-code/vibe-vscode-${{ steps.version.outputs.VERSION }}.vsix
          asset_name: vibe-vscode-${{ steps.version.outputs.VERSION }}.vsix
          asset_content_type: application/octet-stream
      
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Vibe VS Code Extension ${{ github.ref_name }}
          body: |
            ## Vibe VS Code Extension Release
            
            Install from VS Code Marketplace or download the VSIX file below.
            
            **Features:**
            - 6 AI Modes (Code, Architect, Debug, Test, Review, Explain)
            - Multi-provider support
            - Direct file operations
            - 5 visual themes
          draft: false
          prerelease: false
